apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: heritage-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: heritage-backend
  template:
    metadata:
      labels:
        app: heritage-backend
    spec:
      containers:
        - name: backend
          image: heritage-backend
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: "sqlite:///data/heritage.db?mode=rwc"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: jwt-secret
                  optional: true
            - name: AVALANCHE_RPC_URL
              value: "https://api.avax-test.network/ext/bc/C/rpc"
            - name: ANTHROPIC_API_KEY
              value: "REDACTED"
            - name: OPENAI_API_KEY
              value: "REDACTED"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3001"
            - name: DOCUMENT_STORAGE_PATH
              value: "/documents"
            - name: CERTIFIER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: certifier-private-key
                  optional: true
            - name: DOC_REGISTRY_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: doc-registry-address
                  optional: true
            - name: FACTORY_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: factory-address
                  optional: true
            - name: REGISTRY_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: registry-address
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: documents
              mountPath: /documents
          startupProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: heritage-db
        - name: documents
          persistentVolumeClaim:
            claimName: heritage-documents
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: heritage-backend
  ports:
    - port: 3001
      targetPort: 3001

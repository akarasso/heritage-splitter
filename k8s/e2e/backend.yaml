apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: heritage-e2e
  labels:
    app: heritage-backend-e2e
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: heritage-backend-e2e
  template:
    metadata:
      labels:
        app: heritage-backend-e2e
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: heritage-backend-e2e
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: "sqlite:///data/heritage.db?mode=rwc"
            - name: JWT_SECRET
              value: "e2e-test-secret"
            - name: AVALANCHE_RPC_URL
              value: "http://anvil:8545"
            - name: CHAIN_ID
              value: "31337"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3001"
            - name: DOCUMENT_STORAGE_PATH
              value: "/documents"
            - name: CERTIFIER_PRIVATE_KEY
              value: "ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
            - name: CERTIFIER_ADDRESS
              value: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            - name: FACTORY_ADDRESS
              value: ""
            - name: MARKET_ADDRESS
              value: ""
            - name: DOC_REGISTRY_ADDRESS
              value: ""
            - name: REGISTRY_ADDRESS
              value: ""
            - name: RATE_LIMIT_PER_MIN
              value: "600"
            - name: WS_RATE_LIMIT_PER_MIN
              value: "120"
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
            - name: MINIO_BUCKET
              value: "heritage-e2e"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: documents
              mountPath: /documents
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 15
      volumes:
        - name: data
          emptyDir: {}
        - name: documents
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: heritage-e2e
spec:
  selector:
    app: heritage-backend-e2e
  ports:
    - port: 3001
      targetPort: 3001

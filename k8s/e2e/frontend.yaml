apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: heritage-e2e
  labels:
    app: heritage-frontend-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heritage-frontend-e2e
  template:
    metadata:
      labels:
        app: heritage-frontend-e2e
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: heritage-frontend-e2e
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: heritage-e2e
spec:
  selector:
    app: heritage-frontend-e2e
  ports:
    - port: 3000
      targetPort: 3000

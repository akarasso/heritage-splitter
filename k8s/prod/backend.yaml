apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: heritage
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: heritage-splitter
spec:
  replicas: 1
  strategy:
    type: Recreate          # SQLite = single writer, no rolling update
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: heritage-splitter
    spec:
      imagePullSecrets:
        - name: ovh-registry
      containers:
        - name: backend
          image: 97ksui70.c1.gra9.container-registry.ovh.net/heritage-splitter/heritage-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: DATABASE_URL
              value: "sqlite:///data/heritage.db?mode=rwc"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: jwt-secret
            - name: AVALANCHE_RPC_URL
              value: "https://api.avax-test.network/ext/bc/C/rpc"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3001"
            - name: CHAIN_ID
              value: "43113"
            - name: FACTORY_ADDRESS
              value: "0xC1785ecf38d373e9EF76f07680254Aa00e65b97e"
            - name: CERTIFIER_ADDRESS
              value: "0xbC03569e83d37Af715Ce0FF1997C6245c8A36d58"
            - name: DOC_REGISTRY_ADDRESS
              value: "0x2876e2E97d62A837ed38645fd0B648d0502c878d"
            - name: REGISTRY_ADDRESS
              value: "0x6839A0555330CED7aaDCa8c7333ee234Ed487c3D"
            - name: DOCUMENT_STORAGE_PATH
              value: "/data/documents"
            - name: CERTIFIER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: certifier-private-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heritage-secrets
                  key: openai-api-key
          volumeMounts:
            - name: db-storage
              mountPath: /data
          startupProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: heritage-db
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: heritage
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: heritage-splitter
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 3001
      targetPort: 3001
      name: http

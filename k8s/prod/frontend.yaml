apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: heritage
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: heritage-splitter
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: heritage-splitter
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ovh-registry
      containers:
        - name: frontend
          # I8: Replace :latest with git short SHA at deploy time:
          #   sed -i "s/IMAGE_TAG/$(git rev-parse --short HEAD)/" k8s/prod/frontend.yaml
          image: 97ksui70.c1.gra9.container-registry.ovh.net/heritage-splitter/heritage-frontend:IMAGE_TAG
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: caddy-config
              mountPath: /config/caddy
            - name: caddy-data
              mountPath: /data/caddy
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: caddy-config
          emptyDir: {}
        - name: caddy-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: heritage
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: heritage-splitter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - port: 80
      targetPort: 3000
      name: http

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: heritage-ingress
  namespace: heritage
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - avax.emblem-tech.eu
      secretName: heritage-tls
  rules:
    - host: avax.emblem-tech.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
